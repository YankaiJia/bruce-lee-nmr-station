<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocol Selection</title>
    <script src="https://unpkg.com/htmx.org@2.0.1" integrity="sha384-QWGpdj554B4ETpJJC9z+ZHJcA/i59TyjxEPXiiUgN2WmTyV5OEZWCD6gQhgkdpB/" crossorigin="anonymous"></script>
</head>
<style>
	:root {
		--primary-color: #3498db;
		--secondary-color: #2c3e50;
		--background-color: #ecf0f1;
		--text-color: #34495e;
		--shadow-color: rgba(0, 0, 0, 0.1);
	}

	body {
		font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
		background-color: var(--background-color);
		color: var(--text-color);
		line-height: 1.6;
		margin: 0;
		padding: 0;
		display: flex;
		flex-direction: column;
		justify-content: center;
		align-items: center;
		min-height: 100vh;
	}

	.container {
		background-color: white;
		border-radius: 8px;
		box-shadow: 0 4px 6px var(--shadow-color);
		padding: 2rem;
		width:  250px;
	}

	h1 {
		color: var(--secondary-color);
		margin-top: 0;
		margin-bottom: 1.5rem;
		text-align: center;
	}

	h2 {
		color: var(--primary-color);
		font-size: 1.2rem;
		margin-bottom: 1rem;
	}

	#current-protocol {
		font-weight: bold;
	}

	form {
		display: flex;
		flex-direction: column;
	}

	select input {
		padding: 0.5rem;
		margin-bottom: 1rem;
		border: 1px solid #ccc;
		border-radius: 4px;
		font-size: 1rem;
	}

	button {
		background-color: var(--primary-color);
		color: white;
		border: none;
		padding: 0.7rem 1rem;
		font-size: 1rem;
		border-radius: 4px;
		cursor: pointer;
		transition: background-color 0.3s ease;
	}

	button:hover {
		background-color: #2980b9;
	}

	@media (max-width: 600px) {
		.container {
			width: 95%;
			padding: 1.5rem;
		}
	}
	
</style>
<body>
    <div class="container">
        <label >Select a protocol</label>
        <select class="submit-val" hx-get="/select_protocol" name="protocol" hx-target="#protocol-options" hx-swap="outerHTML">
            <option > Select Protocol </option>
            {% for protocol in protocols %}
            <option value="{{ protocol }}">{{ protocol }}</option>
            {% endfor %}
        </select>
        <div id="protocol-options" hx-swap="outerHTML">
        </div>
		<button id="submit-btn" hx-post="/submit_protocol/" hx-include=".submit-val" hx-target="this">Submit</button>
    </div>
	   
    <div id="bottom-line"> This is the bottom line.</div>
</body>
</html>
